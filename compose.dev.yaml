services:
  backend:
    build:
      context: .
      target: dev
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env.development
    environment:
      - CI=true
      - PNPM_HOME=/pnpm-store
    command: pnpm exec nest start --watch
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/backend/node_modules
      - pnpm_global_store:/pnpm-store
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      disable: true

  frontend:
    build:
      context: .
      target: dev
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env.development
    environment:
      - CHOKIDAR_USEPOLLING=true
      - PNPM_HOME=/pnpm-store
    volumes:
      - ./:/app/
      - /app/node_modules
      - /app/frontend/node_modules
      - pnpm_global_store:/pnpm-store
    depends_on:
      - backend

volumes:
  pnpm_global_store:
