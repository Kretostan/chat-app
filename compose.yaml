services:
  backend:
    build:
      context: .
      target: prod
      dockerfile: Dockerfile.backend
    environment:
      - NODE_ENV=production
    ports:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e ''require("http").get("http://localhost:3000/health", (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })''',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      target: prod
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
